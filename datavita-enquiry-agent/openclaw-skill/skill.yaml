name: datavita-enquiry-agent
version: 2.0.0
description: Routes inbound data centre enquiries through the live DataVita Enquiry Intelligence API and returns responses via Telegram.
author: Zayd Hussain

triggers:
  - keyword: "datavita enquiry"
  - keyword: "data centre enquiry"
  - keyword: "colocation"

session:
  maintain_history: true
  history_key: messages

steps:
  - name: qualify
    type: http
    url: "https://datavita-openclaw-challenge.vercel.app/api/qualify"
    method: POST
    headers:
      Content-Type: "application/json"
    body:
      messages: "{session.messages}"
      stage: "questioning"
    reply: "{response.message}"
    loop:
      until: "{response.isComplete}"

  - name: generate_brief
    type: http
    url: "https://datavita-openclaw-challenge.vercel.app/api/qualify"
    method: POST
    headers:
      Content-Type: "application/json"
    body:
      messages: "{session.messages}"
      stage: "generating"
      generateBrief: true
      qualificationData: "{response.qualificationData}"
      intelligenceContext: "{response.intelligenceContext}"
      priority: "{response.priority}"
    reply: |
      Your DataVita sales brief is ready.
      {response.brief}